services:
  tennis-ranks:
    build: .
    container_name: tennis-ranks
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TENNIS_ADMIN_PASSWORD: "${TENNIS_ADMIN_PASSWORD:?set TENNIS_ADMIN_PASSWORD}"
      TENNIS_DB_FILE: "/data/tennis.db"
      TENNIS_COOKIE_SECURE: "1"
      TENNIS_TRUST_PROXY: "1"
      PORT: "3000"
    volumes:
      - ./data:/data
